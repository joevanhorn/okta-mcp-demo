# ---------------------------------------------------------------------------
# ServiceNow: Product Enhancement Requests
# ---------------------------------------------------------------------------
# Feature requests from customers that the agent uses to identify patterns
# and inform product prioritization.
servicenow_enhancements:
  - number: "ENH-0892"
    title: "Deep entitlement visibility for Oracle EBS"
    description: >
      Need native entitlement discovery for Oracle E-Business Suite
      responsibilities and access sets. Currently requires custom SCIM
      connector which is fragile and expensive to maintain.
    requested_by: "Pinnacle Financial"
    priority: "High"
    product_area: "OIG - Entitlements"
    votes: 12
    status: "Under Review"
    submitted_days_ago: 45

  - number: "ENH-0878"
    title: "Cross-app separation of duties policies"
    description: >
      Need SoD policies that span entitlements across different applications
      (e.g., conflicting roles in Salesforce AND ServiceNow simultaneously).
      Currently SoD only works within a single app.
    requested_by: "Meridian Healthcare"
    priority: "High"
    product_area: "OIG - Risk Rules"
    votes: 23
    status: "Planned - Q3 2026"
    submitted_days_ago: 60

  - number: "ENH-0901"
    title: "Automated entitlement bundle recommendations"
    description: >
      AI-powered suggestions for which entitlements should be grouped into
      bundles based on usage patterns. Manual bundle creation is time-consuming
      for large entitlement sets.
    requested_by: "Acme Corp"
    priority: "Medium"
    product_area: "OIG - Entitlement Bundles"
    votes: 8
    status: "Backlog"
    submitted_days_ago: 30

  - number: "ENH-0865"
    title: "Real-time access certification reminders via Slack"
    description: >
      Send certification campaign reminders directly to Slack channels
      instead of email only. Reviewers miss email reminders — Slack has
      higher visibility for time-sensitive actions.
    requested_by: "Acme Corp"
    priority: "Medium"
    product_area: "OIG - Access Certifications"
    votes: 31
    status: "In Development"
    submitted_days_ago: 90

  - number: "ENH-0910"
    title: "OPA server access for Windows via RDP"
    description: >
      Extend OPA privileged access management to Windows servers via
      native RDP protocol. Currently only supports SSH for Linux.
    requested_by: "Apex Manufacturing"
    priority: "Medium"
    product_area: "OPA - Server Access"
    votes: 15
    status: "Planned - Q4 2026"
    submitted_days_ago: 20

  - number: "ENH-0845"
    title: "Governance API OAuth scope coverage"
    description: >
      Many governance API endpoints still require SSWS tokens and don't
      support OAuth scopes. Need full OAuth coverage for programmatic
      access to governance features.
    requested_by: "Meridian Healthcare"
    priority: "High"
    product_area: "OIG - API"
    votes: 19
    status: "Under Review"
    submitted_days_ago: 75

# ---------------------------------------------------------------------------
# Cross-Reference Queries the Agent Should Handle
# ---------------------------------------------------------------------------
# These are the "wow" questions that demonstrate the value of cross-system
# AI — things that would take a human 30+ minutes to answer manually.
demo_queries:
  - question: "Which customers are requesting entitlement governance features?"
    expected_answer: >
      Cross-references ENH requests tagged "OIG - Entitlements" with Salesforce
      accounts. Shows: Pinnacle Financial (Oracle EBS entitlements, $1.2M prospect),
      Meridian Healthcare (cross-app SoD, $750K expansion), Acme Corp (automated
      bundle recommendations, $2.4M renewal).

  - question: "Show me P1 incidents and associated opportunities — are any deals at risk?"
    expected_answer: >
      Links Acme Corp's 3 P1 incidents to their $360K OPA expansion opportunity
      (blocked — VP Eng won't expand until stability issues resolved) and their
      $2.4M renewal (Yellow health, renewal in September). Total revenue at risk: $2.76M.

  - question: "What are the most-requested product features across all customers?"
    expected_answer: >
      Ranks ENH requests by votes: Slack certification reminders (31 votes),
      cross-app SoD (23 votes), governance API OAuth (19 votes), OPA Windows RDP
      (15 votes), Oracle EBS entitlements (12 votes).

  - question: "Prepare a briefing for the quarterly product review"
    expected_answer: >
      Synthesizes: top customer issues (Acme P1 cluster), at-risk revenue
      ($2.76M Acme + $890K NorthStar), competitive deals (Pinnacle vs SailPoint,
      Meridian vs Saviynt), top feature requests by vote count, and product area
      heatmap (OIG - Entitlements has the most demand).

  - question: "What's the competitive landscape for OIG deals this quarter?"
    expected_answer: >
      Pinnacle Financial: SailPoint (need deep entitlement visibility to win).
      Meridian Healthcare: Saviynt (eliminated in round 2, we're winning).
      Acme Corp OPA: CyberArk (early stage, blocked by P1s).
